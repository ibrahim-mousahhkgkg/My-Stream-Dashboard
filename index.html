<!doctype html>
<html lang="en">
<head>
    <title>My Stream Dashboard</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
<nav class="nav">
    <div class="logo">My Stream</div>
    <ul class="nav-links">
        <li><a href="#">Discover</a></li>
        <li><a href="#">PlayList</a></li>
        <li><a href="#">Favourites</a></li>
    </ul>
</nav>

<div class="main-container">
    <aside class="sidebar" id="sidebar">
        <h2>Filters</h2>
        <div class="filter-section">
            <button class="filter-tab active" data-filter="all">All Streams</button>
            <button class="filter-tab" data-filter="live">Live Now</button>
            <button class="filter-tab" data-filter="offline">Offline</button>
        </div>
    </aside>

    <main class="content-area">
        <div class="search-section">
            <input type="text" id="search-streams" placeholder="Search streams...">
        </div>
        <div class="stream-grid" id="stream-grid"></div>
    </main>
</div>

<script src="dashboard.js"></script>
</body>
</html>
